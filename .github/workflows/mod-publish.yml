name: Java CI + Release

on:
  push:
    branches:
      - '*.*'
      - '*.*.*'
      - '*.*_dev'
      - '*.*.*_dev'
  pull_request:
    branches:
      - '*.*'
      - '*.*.*'
      - '*.*_dev'
      - '*.*.*_dev'
  workflow_dispatch:
  release:
    types: [published]

env:
  MOD_LOADER: forge
  GAME_VERSION_FILTER: releases
  PRIMARY_FILE_GLOB: "*.jar"

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mod_version: ${{ steps.meta.outputs.mod_version }}
      mc_version: ${{ steps.meta.outputs.mc_version }}
      java_version: ${{ steps.meta.outputs.java_version }}
      game_versions: ${{ steps.meta.outputs.game_versions }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read metadata from gradle.properties
        id: meta
        shell: bash
        run: |
          mod_version=$(grep -E '^mod_version\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)
          minecraft_version=$(grep -E '^(mc_version|minecraft_version)\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)
          java_version=$(grep -E '^java_compatability_level\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)

          if [[ -z "$mod_version" ]]; then
            echo "ERROR: mod_version is missing from gradle.properties" >&2
            exit 1
          fi

          if [[ -z "$minecraft_version" ]]; then
            echo "ERROR: mc_version/minecraft_version is missing from gradle.properties" >&2
            exit 1
          fi

          if [[ -z "$java_version" ]]; then
            echo "ERROR: java_compatability_level is missing from gradle.properties" >&2
            exit 1
          fi

          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "mc_version=$minecraft_version" >> "$GITHUB_OUTPUT"
          echo "java_version=$java_version" >> "$GITHUB_OUTPUT"
          echo "game_versions=[\"$minecraft_version\"]" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.meta.outputs.java_version }}
          cache: gradle

      - name: Set execution permissions for Gradle wrapper
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Upload artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/${{ env.PRIMARY_FILE_GLOB }}

  dependency-submission:
    name: Dependency Submission
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4

  publish-to-github:
    name: Attach JAR to GitHub Release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Detect branch and release type
        id: release_context
        shell: bash
        run: |
          source_branch="${{ github.event.release.target_commitish }}"

          is_valid_release_branch=false
          is_dev_source=false

          if [[ "$source_branch" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?(_dev)?$ ]]; then
            is_valid_release_branch=true
          fi

          if [[ "$source_branch" =~ _dev$ ]]; then
            is_dev_source=true
          fi

          {
            echo "source_branch=$source_branch"
            echo "is_valid_release_branch=$is_valid_release_branch"
            echo "is_dev_source=$is_dev_source"
          } >> "$GITHUB_OUTPUT"

      - name: Require semver or semver_dev branch
        if: steps.release_context.outputs.is_valid_release_branch != 'true'
        run: |
          echo "ERROR: Release must come from a branch named like 1.20, 1.20.1, 1.20_dev, or 1.20.1_dev"
          exit 1

      - name: Validate release tag matches mod_version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag="${tag#v}"
          if [[ "$tag" != "${{ needs.build.outputs.mod_version }}" ]]; then
            echo "ERROR: Release tag '$tag' does not match mod_version '${{ needs.build.outputs.mod_version }}' from gradle.properties" >&2
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Add alpha warning to release body
        if: steps.release_context.outputs.is_dev_source == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const warning = [
              '## WARNING',
              '',
              '**THIS RELEASE IS ALPHA UNTESTED SOFTWARE.**',
              ''
            ].join('\n');

            const release = context.payload.release;
            const existingBody = release.body || '';

            if (!existingBody.includes('THIS RELEASE IS ALPHA UNTESTED SOFTWARE.')) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: `${warning}\n${existingBody}`.trim()
              });
            }

      - name: Publish to GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-prerelease: ${{ steps.release_context.outputs.is_dev_source == 'true' }}
          files: artifacts/${{ env.PRIMARY_FILE_GLOB }}
          version-type: ${{ steps.release_context.outputs.is_dev_source == 'true' && 'alpha' || 'release' }}
          loaders: ${{ env.MOD_LOADER }}
          game-versions: ${{ needs.build.outputs.game_versions }}
          game-version-filter: ${{ env.GAME_VERSION_FILTER }}
          java: ${{ needs.build.outputs.java_version }}
