name: Java CI + Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build/publish (example: 1.20.1 or 1.20.1_dev)'
        required: true
        type: string
      publish:
        description: 'Create/update a GitHub Release and publish artifacts'
        required: true
        type: boolean
        default: false
      tag:
        description: 'Optional release tag override. Leave blank to use mod_version from gradle.properties'
        required: false
        type: string
      release_name:
        description: 'Optional release title override. Leave blank to use the tag'
        required: false
        type: string

  push:
    branches:
      - '*.*'
      - '*.*.*'
      - '*.*_dev'
      - '*.*.*_dev'

  pull_request:
    branches:
      - '*.*'
      - '*.*.*'
      - '*.*_dev'
      - '*.*.*_dev'

  release:
    types: [published]

env:
  MOD_LOADER: forge
  GAME_VERSION_FILTER: releases
  PRIMARY_FILE_GLOB: "*.jar"

jobs:
  prepare:
    name: Prepare context
    runs-on: ubuntu-latest
    outputs:
      source_branch: ${{ steps.ctx.outputs.source_branch }}
      checkout_ref: ${{ steps.ctx.outputs.checkout_ref }}
      is_valid_release_branch: ${{ steps.ctx.outputs.is_valid_release_branch }}
      is_dev_source: ${{ steps.ctx.outputs.is_dev_source }}
      should_publish: ${{ steps.ctx.outputs.should_publish }}
      release_tag: ${{ steps.ctx.outputs.release_tag }}
      release_name: ${{ steps.ctx.outputs.release_name }}

    steps:
      - name: Resolve event context
        id: ctx
        shell: bash
        run: |
          event_name="${{ github.event_name }}"

          source_branch=""
          checkout_ref=""
          should_publish=false
          release_tag=""
          release_name=""

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            source_branch="${{ inputs.branch }}"
            checkout_ref="${{ inputs.branch }}"
            should_publish="${{ inputs.publish }}"
            release_tag="${{ inputs.tag }}"
            release_name="${{ inputs.release_name }}"
          elif [[ "$event_name" == "release" ]]; then
            source_branch="${{ github.event.release.target_commitish }}"
            checkout_ref="${{ github.event.release.tag_name }}"
            should_publish=true
            release_tag="${{ github.event.release.tag_name }}"
            release_name="${{ github.event.release.name }}"
          else
            source_branch="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
            should_publish=false
            release_tag=""
            release_name=""
          fi

          is_valid_release_branch=false
          is_dev_source=false

          if [[ "$source_branch" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?(_dev)?$ ]]; then
            is_valid_release_branch=true
          fi

          if [[ "$source_branch" =~ _dev$ ]]; then
            is_dev_source=true
          fi

          {
            echo "source_branch=$source_branch"
            echo "checkout_ref=$checkout_ref"
            echo "is_valid_release_branch=$is_valid_release_branch"
            echo "is_dev_source=$is_dev_source"
            echo "should_publish=$should_publish"
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

      - name: Require semver or semver_dev branch
        if: steps.ctx.outputs.is_valid_release_branch != 'true'
        run: |
          echo "ERROR: Branch must be named like 1.20, 1.20.1, 1.20_dev, or 1.20.1_dev"
          exit 1

  build:
    name: Build JAR
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mod_version: ${{ steps.meta.outputs.mod_version }}
      mc_version: ${{ steps.meta.outputs.mc_version }}
      java_version: ${{ steps.java_select.outputs.java_version }}
      game_versions: ${{ steps.meta.outputs.game_versions }}
      final_tag: ${{ steps.release_meta.outputs.final_tag }}
      final_release_name: ${{ steps.release_meta.outputs.final_release_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Read metadata from gradle.properties
        id: meta
        shell: bash
        run: |
          mod_version=$(grep -E '^mod_version\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)
          minecraft_version=$(grep -E '^(mc_version|minecraft_version)\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)
          java_version=$(grep -E '^java_compatability_level\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)

          if [[ -z "$mod_version" ]]; then
            echo "ERROR: mod_version is missing from gradle.properties" >&2
            exit 1
          fi

          if [[ -z "$minecraft_version" ]]; then
            echo "ERROR: mc_version/minecraft_version is missing from gradle.properties" >&2
            exit 1
          fi

          if [[ -z "$java_version" ]]; then
            java_version=17
          fi

          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "mc_version=$minecraft_version" >> "$GITHUB_OUTPUT"
          echo "java_version=$java_version" >> "$GITHUB_OUTPUT"
          echo "game_versions=[\"$minecraft_version\"]" >> "$GITHUB_OUTPUT"

      - name: Select Java version
        id: java_select
        shell: bash
        run: |
          mc="${{ steps.meta.outputs.mc_version }}"
          java_version="${{ steps.meta.outputs.java_version }}"

          # Force newer Java for 1.21.x
          if [[ "$mc" =~ ^1\.21(\.|$) ]]; then
            java_version=21
          fi

          echo "java_version=$java_version" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag and title
        id: release_meta
        shell: bash
        run: |
          mod_version="${{ steps.meta.outputs.mod_version }}"
          input_tag="${{ needs.prepare.outputs.release_tag }}"
          input_name="${{ needs.prepare.outputs.release_name }}"

          final_tag="$input_tag"
          if [[ -z "$final_tag" ]]; then
            final_tag="$mod_version"
          fi

          final_release_name="$input_name"
          if [[ -z "$final_release_name" ]]; then
            final_release_name="$final_tag"
          fi

          echo "final_tag=$final_tag" >> "$GITHUB_OUTPUT"
          echo "final_release_name=$final_release_name" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches mod_version
        if: github.event_name == 'release'
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          tag="${tag#v}"
          if [[ "$tag" != "${{ steps.meta.outputs.mod_version }}" ]]; then
            echo "ERROR: Release tag '$tag' does not match mod_version '${{ steps.meta.outputs.mod_version }}' from gradle.properties" >&2
            exit 1
          fi

      - name: Validate manual tag matches mod_version
        if: github.event_name == 'workflow_dispatch' && needs.prepare.outputs.should_publish == 'true'
        shell: bash
        run: |
          tag="${{ steps.release_meta.outputs.final_tag }}"
          tag="${tag#v}"
          if [[ "$tag" != "${{ steps.meta.outputs.mod_version }}" ]]; then
            echo "ERROR: Manual release tag '$tag' does not match mod_version '${{ steps.meta.outputs.mod_version }}' from gradle.properties" >&2
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.java_select.outputs.java_version }}
          cache: gradle

      - name: Set execution permissions for Gradle wrapper
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Upload artifacts
        if: needs.prepare.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/${{ env.PRIMARY_FILE_GLOB }}

  dependency-submission:
    name: Dependency Submission
    if: github.event_name != 'release'
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate and submit dependency graph
        continue-on-error: true
        uses: gradle/actions/dependency-submission@v4

  create-or-update-release:
    name: Create or update GitHub Release
    if: github.event_name == 'workflow_dispatch' && needs.prepare.outputs.should_publish == 'true'
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.release_id }}

    steps:
      - name: Create or update release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ needs.build.outputs.final_tag }}`;
            const releaseName = `${{ needs.build.outputs.final_release_name }}`;
            const prerelease = `${{ needs.prepare.outputs.is_dev_source }}` === 'true';

            const warning = prerelease
              ? '## WARNING\n\n**THIS RELEASE IS ALPHA UNTESTED SOFTWARE.**\n'
              : '';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const target_commitish = `${{ needs.prepare.outputs.source_branch }}`;

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              release = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: releaseName,
                target_commitish,
                prerelease,
                body: warning
              });
            } catch (error) {
              if (error.status !== 404) throw error;

              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                target_commitish,
                prerelease,
                body: warning
              });
            }

            core.setOutput('upload_url', release.data.upload_url);
            core.setOutput('release_id', String(release.data.id));

  publish-to-github:
    name: Attach JAR to GitHub Release
    if: needs.prepare.outputs.should_publish == 'true'
    needs: [prepare, build, create-or-update-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Add alpha warning to existing release body
        if: github.event_name == 'release' && needs.prepare.outputs.is_dev_source == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const warning = [
              '## WARNING',
              '',
              '**THIS RELEASE IS ALPHA UNTESTED SOFTWARE.**',
              ''
            ].join('\n');

            const release = context.payload.release;
            const existingBody = release.body || '';

            if (!existingBody.includes('THIS RELEASE IS ALPHA UNTESTED SOFTWARE.')) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: `${warning}\n${existingBody}`.trim(),
                prerelease: true
              });
            }

      - name: Publish to GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-prerelease: ${{ needs.prepare.outputs.is_dev_source == 'true' }}
          files: artifacts/${{ env.PRIMARY_FILE_GLOB }}
          version-type: ${{ needs.prepare.outputs.is_dev_source == 'true' && 'alpha' || 'release' }}
          loaders: ${{ env.MOD_LOADER }}
          game-versions: ${{ needs.build.outputs.game_versions }}
          game-version-filter: ${{ env.GAME_VERSION_FILTER }}
          java: ${{ needs.build.outputs.java_version }}
